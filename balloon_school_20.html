<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:linear-gradient(160deg,#EAF7F2 0%,#DDF1F7 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden;}
#gc{position:relative;width:680px;height:480px;max-width:96vw;max-height:96vh;overflow:hidden;border-radius:14px;border:4px solid rgba(31,105,84,0.4);box-shadow:0 10px 40px rgba(31,105,84,0.25);}
canvas{display:block;width:100%;height:100%;}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none;}
#hud{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:rgba(255,255,255,0.6);backdrop-filter:blur(4px);flex-wrap:wrap;gap:3px;}
.hi{color:#1f3a34;font-size:11px;font-weight:600;display:flex;align-items:center;gap:3px;}
#pauseBtn{cursor:pointer;pointer-events:auto;background:rgba(31,105,84,0.12);border-radius:8px;padding:2px 8px;user-select:none;}
#pauseBtn:hover{background:rgba(31,105,84,0.22);}
#airBar{width:80px;height:8px;background:rgba(31,105,84,0.15);border-radius:4px;overflow:hidden;border:1px solid rgba(31,105,84,0.25);}
#airFill{height:100%;width:100%;background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77);border-radius:4px;}
#cdBar{width:80px;height:8px;background:rgba(31,105,84,0.15);border-radius:4px;overflow:hidden;border:1px solid rgba(31,105,84,0.25);display:none;}
#cdFill{height:100%;background:#6bcb77;border-radius:4px;}

/* ── OVERLAY SCREENS ── */
#scr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:rgba(40,92,78,0.72);backdrop-filter:blur(8px);color:#fff;gap:10px;padding:20px;z-index:20;overflow-y:auto;}
#scr::before,#scr::after{content:'';flex:1 0 0;min-height:0;}
#scr h1{font-size:26px;font-weight:700;text-align:center;}
#scr h2{font-size:18px;font-weight:700;text-align:center;margin-bottom:2px;}
#scr p{font-size:12px;text-align:center;color:#ddd;max-width:460px;line-height:1.55;}
.sbtn{background:#ffd93d;color:#333;border:none;padding:9px 26px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;transition:background 0.15s;}
.sbtn:hover{background:#ffca28;}
.sbtn.gray{background:#7c8f87;color:#fff;}.sbtn.gray:hover{background:#8fa39b;}
.sbtn.red{background:#e53935;color:#fff;}.sbtn.red:hover{background:#c62828;}
.sbtn.teal{background:#5FB89E;color:#fff;}.sbtn.teal:hover{background:#4fa78d;}
.topt{background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25);color:#fff;padding:5px 12px;border-radius:14px;font-size:12px;cursor:pointer;transition:all 0.15s;}
.topt:hover,.topt.sel{background:#ffd93d;color:#333;border-color:#ffd93d;}
#timePicker{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:3px 0;}

/* ── BRIEFING CARD ── */
#briefing{display:flex;flex-direction:column;gap:6px;width:100%;max-width:480px;}
.brief-row{display:flex;align-items:flex-start;gap:8px;background:rgba(255,255,255,0.14);border-radius:8px;padding:7px 10px;font-size:12px;line-height:1.4;}
.brief-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.brief-safe{border-left:3px solid #6bcb77;}
.brief-warn{border-left:3px solid #ffd93d;}
.brief-danger{border-left:3px solid #e53935;}
.brief-title{font-weight:700;color:#fff;margin-bottom:1px;}
.brief-desc{color:#bbb;}
.diff-pill{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;}
.diff-easy{background:#6bcb77;color:#1b3a1b;}
.diff-medium{background:#ffd93d;color:#3a2e00;}
.diff-hard{background:#ff8c00;color:#fff;}
.diff-brutal{background:#e53935;color:#fff;}

// ── SAVE / LOAD ──
function saveGame(lv,sc,note){
  const d={level:lv,score:sc,note:note||'',ts:Date.now()};
  localStorage.setItem('bs_save',JSON.stringify(d));
}
function loadSave(){
  try{return JSON.parse(localStorage.getItem('bs_save')||'null');}catch(e){return null;}
}
function clearSave(){localStorage.removeItem('bs_save');}
function fmtDate(ts){
  const d=new Date(ts);
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}

// ── AUDIO ──
let AC=null;
function getAC(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function tone(freq,type,dur,vol,delay=0){
  try{const ac=getAC();if(!ac)return;
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(0,ac.currentTime+delay);
    g.gain.linearRampToValueAtTime(vol,ac.currentTime+delay+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+delay+dur);
    o.start(ac.currentTime+delay);o.stop(ac.currentTime+delay+dur+0.06);
  }catch(e){}
}
function noise(dur,vol){
  try{const ac=getAC();if(!ac)return;
    const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*dur),ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(ac.sampleRate*dur*0.6));
    const s=ac.createBufferSource(),g=ac.createGain();
    s.buffer=buf;s.connect(g);g.connect(ac.destination);g.gain.value=vol;s.start();
  }catch(e){}
}
function sfxCollect(){tone(660,'sine',0.08,0.28);tone(880,'sine',0.08,0.22,0.07);tone(1100,'sine',0.1,0.18,0.13);}
function sfxPop(){tone(200,'sawtooth',0.05,0.45);tone(80,'sawtooth',0.28,0.38,0.04);noise(0.3,0.5);}
function sfxLeak(){tone(750,'sawtooth',0.16,0.1);tone(180,'sawtooth',0.16,0.07,0.05);}
function sfxFanPush(){tone(300,'triangle',0.08,0.2);}
function sfxLevelUp(){[523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.16,0.28,i*0.1));}
function sfxTimerWarn(){tone(880,'square',0.07,0.28);tone(1100,'square',0.07,0.22,0.12);}
function sfxTimerOut(){[523,493,440,392,349].forEach((f,i)=>tone(f,'triangle',0.18,0.28,i*0.1));}
function sfxBell(){tone(880,'sine',0.65,0.32);tone(1760,'sine',0.38,0.16,0.06);}
function sfxBus(){tone(120,'sawtooth',0.28,0.38);tone(180,'sawtooth',0.1,0.25,0.24);}
function playPopMusic(){stopBgMusic();[523,466,415,369,329,293,261,196].forEach((f,i)=>tone(f,'triangle',0.22,0.2,i*0.13));}
function playWinMusic(){stopBgMusic();setTimeout(()=>{[523,659,784,659,784,1047,784,1047,1308].forEach((f,i)=>tone(f,'sine',0.16,0.24,i*0.1));},180);}

function startBgMusic(lv){
  stopBgMusic();
  try{const ac=getAC();if(!ac)return;
    const mg=ac.createGain();mg.gain.value=0.07;mg.connect(ac.destination);
    const sc=SCALES[lv%SCALES.length];let bi=0;
    const iv=setInterval(()=>{
      if(bgMusic!==iv){clearInterval(iv);return;}
      try{const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(mg);o.type='triangle';
        o.frequency.value=sc[bi%sc.length]*(bi%16<8?1:0.5);
        g.gain.setValueAtTime(0,ac.currentTime);
        g.gain.linearRampToValueAtTime(1,ac.currentTime+0.01);
        g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+0.18);
        o.start();o.stop(ac.currentTime+0.22);bi++;
      }catch(e){}
    },215);
    bgMusic=iv;
  }catch(e){}
}

  {type:'danger',icon:'🌀',title:'SIX maximum-speed fans',desc:'Fastest fans in the whole game. Plan every move.'},
  {type:'danger',icon:'🎯',title:'Fast darts',desc:'Darts swinging at max speed.'},
  {type:'safe',icon:'🌟',title:'But you CAN do it!',desc:'Every level has a safe path. The notepads are always reachable. Take your time, plan ahead, and you\'ll make it through the whole school day!'},
]},
];
// ── HELPERS ──
function rnd(a,b){return a+Math.random()*(b-a);}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function lerp(a,b,t){return a+(b-a)*t;}

// difficulty → label+class
const DIFF_INFO={1:{label:'Easy',cls:'diff-easy'},2:{label:'Medium',cls:'diff-medium'},3:{label:'Hard',cls:'diff-hard'},4:{label:'Brutal',cls:'diff-brutal'}};

// ── SAFE COLLECTIBLE PLACEMENT ──
// Ensures every collectible has a clear 75px radius from any hazard
function safePlace(allHazards,existingCols){
  const MARGIN=75;
  for(let attempt=0;attempt<60;attempt++){
    const cx=rnd(180,worldW-220),cy=rnd(95,320);
    let safe=true;
    for(const h of allHazards){if(Math.hypot(cx-h.x,cy-h.y)<MARGIN){safe=false;break;}}
    for(const c of existingCols){if(Math.hypot(cx-c.x,cy-c.y)<60){safe=false;break;}}
    if(safe)return{x:cx,y:cy};
  }
  // fallback: guaranteed open lane at y=150–200
  return{x:rnd(180,worldW-220),y:rnd(150,200)};
}

// ── BUILD LEVEL ──
function buildLevel(lv){
  hazards=[];collectibles=[];particles=[];fans=[];winds=[];bgObjs=[];buses=[];
  air=100;leakRate=0;collected=0;invincible=0;levelComplete=false;
  player.x=80;player.y=220;player.vx=0;player.vy=0;
  cameraX=0;worldW=2100;
  door.x=worldW-120;door.y=175;
  startTime=performance.now();elapsed=0;
  timeLeft=timeLimitSec;timerActive=timeLimitSec>0;warnedTimer=false;

  const cfg=LEVELS[lv];
  document.getElementById('levelName').textContent=cfg.icon+' '+cfg.name;
  document.getElementById('lvlBadge').textContent=cfg.badge;
  document.getElementById('airFill').style.width='100%';
  document.getElementById('hsDisp').textContent=highScore;
  if(timerActive){
    document.getElementById('cdBar').style.display='block';
    document.getElementById('cdFill').style.width='100%';
    document.getElementById('cdText').textContent='⏱'+Math.ceil(timeLeft)+'s';
  }else{
    document.getElementById('cdBar').style.display='none';
    document.getElementById('cdText').textContent='';
  }
  startBgMusic(lv);

  // Difficulty scaling
  const diff=cfg.difficulty;
  const hCount=8+diff*3;   // easy=11, medium=14, hard=17, brutal=20
  const moveChance=[0,0.25,0.4,0.55,0.60][diff];
  const mspeedMult=[0,0.7,0.9,1.1,1.3][diff];

  // ── Fans ──
  const fc=cfg.fanCount||0;
  if(fc>0){
    const spread=(worldW-450)/Math.max(fc,1);
    for(let i=0;i<fc;i++)
      fans.push({x:250+i*spread,y:52,r:46,angle:rnd(0,Math.PI*2),speed:cfg.fanSpeed});
  }

  // ── Hazards (placed first so collectibles avoid them) ──
  const types=cfg.hazTypes;
  const spread2=(worldW-400)/hCount;
  for(let i=0;i<hCount;i++){
    const t=types[i%types.length];
    const moving=(t==='scissors'||t==='dart'||t==='wire'||t==='pencil')&&Math.random()<moveChance;
    const x=200+i*spread2+rnd(-spread2*0.35,spread2*0.35);
    const y=rnd(105,345);
    hazards.push({type:t,x,y,moving,mt:rnd(0,6.28),mx:x,mrange:rnd(50,105),mspeed:rnd(0.9,1.8)*mspeedMult,vy:0});
  }
  // Extra scatter
  const extras=4+diff*2;
  for(let i=0;i<extras;i++){
    const t=types[Math.floor(Math.random()*types.length)];
    hazards.push({type:t,x:rnd(200,worldW-200),y:rnd(100,360),moving:false,mt:0,mx:0,mrange:60,mspeed:1,vy:0});
  }
  // Special hazards per level
  // Music class (lv 12 & 4): bouncing notes + stationary wires
  if(lv===12||lv===4){
    for(let i=0;i<5;i++)
      hazards.push({type:'note',x:rnd(200,worldW-200),y:rnd(100,300),moving:true,mt:rnd(0,6.28),mx:0,mrange:0,mspeed:0,bvx:rnd(-2.2,2.2)||1.5,vy:rnd(-2.2,-1)});
    for(let i=0;i<4;i++)
      hazards.push({type:'wire',x:rnd(250,worldW-200),y:rnd(90,340),moving:false,mt:0,mx:0,mrange:0,mspeed:0,vy:0});
  }
  // Recess (lv 20 & 21): birds
  if(lv===20||lv===21){
    for(let i=0;i<4;i++)
      hazards.push({type:'bird',x:rnd(300,worldW-200),y:rnd(80,200),moving:true,mt:rnd(0,6.28),mx:rnd(300,worldW-200),mrange:rnd(80,160),mspeed:rnd(1.4,2.8),bspeed:rnd(1.8,3.2),vy:0});
  }
  // Computer lab (lv 15): sparks + stationary wires
  if(lv===15){
    const sparkSlotW=(worldW-400)/4;
    for(let i=0;i<4;i++)
      hazards.push({type:'spark',x:200+i*sparkSlotW+rnd(20,sparkSlotW*0.5),y:rnd(100,320),moving:true,mt:rnd(0,6.28),mx:200+i*sparkSlotW+rnd(20,sparkSlotW*0.5),mrange:rnd(30,70),mspeed:rnd(1.2,2.2),vy:0});
    const wireSlotW=(worldW-400)/3;
    for(let i=0;i<3;i++)
      hazards.push({type:'wire',x:220+i*wireSlotW+rnd(30,wireSlotW*0.4),y:rnd(110,310),moving:false,mt:0,mx:0,mrange:0,mspeed:0,vy:0});
  }
  // Science Lab Experiments (lv 30): extra sparks
  if(lv===30){
    for(let i=0;i<4;i++)
      hazards.push({type:'spark',x:rnd(200,worldW-200),y:rnd(90,340),moving:true,mt:rnd(0,6.28),mx:rnd(200,worldW-200),mrange:rnd(40,90),mspeed:rnd(1.5,2.8),vy:0});
  }
  // Bus Ride Home (lv 35): extra scissors between buses
  if(lv===35){
    const slotW=(worldW-400)/4;
    for(let i=0;i<4;i++)
      hazards.push({type:'scissors',x:220+i*slotW+rnd(20,slotW*0.4),y:rnd(100,310),moving:true,mt:rnd(0,6.28),mx:220+i*slotW+rnd(20,slotW*0.4),mrange:rnd(55,90),mspeed:rnd(1.1,1.8),vy:0});
  }
  // After School (lv 34): cap hazards
  if(lv===34){if(hazards.length>13) hazards.splice(13);}
  // The Dream (lv 46): bouncing nightmare notes
  if(lv===46){
    for(let i=0;i<6;i++)
      hazards.push({type:'note',x:rnd(200,worldW-200),y:rnd(100,300),moving:true,mt:rnd(0,6.28),mx:0,mrange:0,mspeed:0,bvx:rnd(-3,3)||2,vy:rnd(-3,-1.5)});
  }
  // The Nightmare (lv 47): max sparks + dense wires
  if(lv===47){
    for(let i=0;i<6;i++)
      hazards.push({type:'spark',x:rnd(200,worldW-200),y:rnd(90,350),moving:true,mt:rnd(0,6.28),mx:rnd(200,worldW-200),mrange:rnd(40,100),mspeed:rnd(2,4),vy:0});
    for(let i=0;i<4;i++)
      hazards.push({type:'wire',x:rnd(200,worldW-200),y:rnd(90,340),moving:true,mt:rnd(0,6.28),mx:rnd(200,worldW-200),mrange:rnd(50,100),mspeed:rnd(1.5,2.8),vy:0});
  }
  // Gauntlet (lv 49): everything at once
  if(lv===49){
    for(let i=0;i<5;i++) hazards.push({type:'spark',x:rnd(200,worldW-200),y:rnd(90,350),moving:true,mt:rnd(0,6.28),mx:rnd(200,worldW-200),mrange:rnd(40,100),mspeed:rnd(2,4),vy:0});
    for(let i=0;i<4;i++) hazards.push({type:'note',x:rnd(200,worldW-200),y:rnd(100,300),moving:true,mt:rnd(0,6.28),mx:0,mrange:0,mspeed:0,bvx:rnd(-3,3)||2,vy:rnd(-3,-1.5)});
    for(let i=0;i<3;i++) hazards.push({type:'wire',x:rnd(200,worldW-200),y:rnd(90,340),moving:true,mt:rnd(0,6.28),mx:rnd(200,worldW-200),mrange:rnd(50,100),mspeed:rnd(1.5,2.8),vy:0});
    for(let i=0;i<4;i++) hazards.push({type:'bird',x:rnd(300,worldW-200),y:rnd(80,200),moving:true,mt:rnd(0,6.28),mx:rnd(300,worldW-200),mrange:rnd(80,160),mspeed:rnd(1.4,2.8),bspeed:rnd(2.5,4),vy:0});
  }
  // Yarn balls (for levels that have cfg.yarn set)
  if(cfg.yarn){
    for(let i=0;i<cfg.yarn;i++){
      const yw=(worldW-400)/(cfg.yarn+1);
      hazards.push({type:'yarn',x:200+(i+1)*yw+rnd(-50,50),y:H-100,moving:true,mt:rnd(0,6.28),mx:0,mrange:0,mspeed:0,bvx:rnd(-1.8,1.8)||1.2,vy:0,yarnCol:['#e91e63','#9c27b0','#2196f3','#ff5722'][i%4]});
    }
  }

  // ── Collectibles (placed AFTER hazards, guaranteed safe) ──
  const numCols=6+Math.floor(diff/2); // 6-7 sheets
  for(let i=0;i<numCols;i++){
    const pos=safePlace(hazards,collectibles);
    collectibles.push({x:pos.x,y:pos.y,bob:rnd(0,6.28),collected:false});
  }
  totalC=collectibles.length;

  // ── Winds ──
  if(cfg.wind){
    const wc=3+diff;
    const ws=(worldW-300)/wc;
    for(let i=0;i<wc;i++)
      winds.push({x:200+i*ws,y:52,w:65,h:310,dir:Math.random()<0.5?1:-1,str:rnd(0.06,0.13+diff*0.02),t:rnd(0,6.28)});
  }

  // ── Background objects ──
  // bg object type per level (50 levels, school-day order)
  const BG_OBJ_PER_LV=[
    'bed','bathroom_shelf','cafTable','wardrobe','desk',         // 0-4  home morning
    'grass','road_sign','grass','bookshelf','desk',              // 5-9  bus/arrival/math
    'desk','art_easel','music_stand','table','grass',            // 10-14 classes
    'desk','computer','bookshelf','desk','desk',                 // 15-19 more classes
    'cafTable','grass','grass','bookshelf','desk',               // 20-24 lunch/recess/math
    'desk','pommel','pommel','bookshelf','desk',                 // 25-29 gym/hallway/office
    'art_easel','table','desk','grass','grass',                  // 30-34 art/science/fire
    'grass','road_sign','grass','grass','bed',                   // 35-39 home
    'cafTable','desk','cafTable','seat','bathroom_shelf',        // 40-44 evening
    'bed','bed','desk','desk','bed','desk',                      // 45-49 night/nightmare/finale
  ];
  const bgt=BG_OBJ_PER_LV[Math.min(lv,BG_OBJ_PER_LV.length-1)];
  for(let i=0;i<12;i++) bgObjs.push({x:80+i*190,type:bgt});

  // ── Buses ──
  if(cfg.busLane){
    const bc=cfg.busCount||3;
    const bspd=cfg.busSpeed||2.5;
    for(let i=0;i<bc;i++)
      buses.push({x:200+i*(worldW/bc),y:H-140,w:130,h:58,speed:bspd+rnd(-0.5,0.5),dir:i%2===0?1:-1});
  }

  updateHUD();
}

function showBriefing(lv){
  state='briefing';
  const cfg=LEVELS[lv];
  const di=DIFF_INFO[cfg.difficulty];
  const typeHTML={
    safe:'brief-safe',warn:'brief-warn',danger:'brief-danger'
  };
  const rows=cfg.briefing.map(b=>`
    <div class="brief-row ${typeHTML[b.type]}">
      <div class="brief-icon">${b.icon}</div>
      <div><div class="brief-title">${b.title}</div><div class="brief-desc">${b.desc}</div></div>
    </div>`).join('');

  SCR.style.display='flex';
  SCR.innerHTML=`
    <h2>${cfg.icon} ${cfg.name}</h2>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px;">
      <span style="font-size:12px;color:#aaa">Level ${lv+1} of ${LEVELS.length}</span>
      <span class="diff-pill ${di.cls}">${di.label}</span>
    </div>
    <div id="briefing">${rows}</div>
    <p style="font-size:11px;color:#d8e8e2;margin-top:2px;">🟢 Green = safe to touch · 🟡 Yellow = slow leak · 🔴 Red = instant pop</p>
    <div style="display:flex;gap:8px;margin-top:6px;">
      <button class="sbtn" id="goBtn">▶ Let's Go!</button>
      ${lv>0?'<button class="sbtn gray" id="menuBtn">↩ Menu</button>':''}
    </div>`;
  document.getElementById('goBtn').onclick=()=>{SCR.style.display='none';buildLevel(lv);state='playing';if(animId)cancelAnimationFrame(animId);loop();};
  if(lv>0&&document.getElementById('menuBtn')) document.getElementById('menuBtn').onclick=showMenu;
}

function retryLevel(){showBriefing(level);}

function nextLevel(){
  level++;
  if(level>=LEVELS.length){winGame();return;}
  sfxBell();showBriefing(level);
}

function winGame(){
  stopBgMusic();playWinMusic();clearSave();
  const newHS=score>highScore;
  if(newHS){highScore=score;localStorage.setItem('bs_hs',score);}
  SCR.style.display='flex';
  SCR.innerHTML=`
    <h1>🎓 Graduated!</h1>
    <p>You survived all 15 school periods!<br>Final Score: <strong>${score} ⭐</strong>${newHS?'<br><strong style="color:#ffd93d">🏆 NEW HIGH SCORE!</strong>':''}<br>High Score: ${highScore}</p>
    <button class="sbtn" id="eb">🎒 Play Again!</button>`;
  document.getElementById('eb').onclick=()=>{level=0;score=0;showBriefing(0);};
}

function popBalloon(){
  if(state==='dead')return;
  state='dead';stopBgMusic();sfxPop();
  setTimeout(()=>playPopMusic(),200);
  for(let i=0;i<40;i++) particles.push({x:player.x,y:player.y,vx:rnd(-8,8),vy:rnd(-9,3),life:1,col:`hsl(${rnd(0,55)},100%,62%)`,r:rnd(3,10)});
  setTimeout(()=>{
    const newHS=score>highScore;
    if(newHS){highScore=score;localStorage.setItem('bs_hs',score);}
    const cfg=LEVELS[level];
    SCR.style.display='flex';
    SCR.innerHTML=`
      <h1>💥 Popped!</h1>
      <p>You were popped in <strong>${cfg.icon} ${cfg.name}</strong><br>Score: ${score} ⭐${newHS?'<br><strong style="color:#ffd93d">🏆 NEW HIGH SCORE!</strong>':''}</p>
      <button class="sbtn" id="retBtn">🔄 Retry ${cfg.icon} ${cfg.name}</button>
      <button class="sbtn gray" id="menuBtn2" style="margin-top:4px">↩ Main Menu</button>`;
    document.getElementById('retBtn').onclick=retryLevel;
    document.getElementById('menuBtn2').onclick=()=>{score=0;showMenu();};
  },1000);
}

function timeOut(){
  if(state==='dead'||state==='complete')return;
  state='dead';stopBgMusic();sfxTimerOut();
  setTimeout(()=>{
    const cfg=LEVELS[level];
    SCR.style.display='flex';
    SCR.innerHTML=`
      <h1>⏰ Time's Up!</h1>
      <p>Ran out of time in <strong>${cfg.icon} ${cfg.name}</strong><br>Score: ${score} ⭐</p>
      <button class="sbtn" id="retBtn">🔄 Retry ${cfg.icon} ${cfg.name}</button>
      <button class="sbtn gray" id="menuBtn3" style="margin-top:4px">↩ Main Menu</button>`;
    document.getElementById('retBtn').onclick=retryLevel;
    document.getElementById('menuBtn3').onclick=()=>{score=0;showMenu();};
  },700);
}

function puncture(sev){
  if(invincible>0)return;invincible=80;
  if(sev==='small'){leakRate+=0.045;sfxLeak();splash(player.x,player.y,5,'rgba(180,220,255,0.8)');}
  else popBalloon();
}

function splash(x,y,n,col){for(let i=0;i<n;i++) particles.push({x,y,vx:rnd(-3,3),vy:rnd(-4,1),life:1,col,r:rnd(2,5)});}

function togglePause(){
  if(state==='playing')pauseGame();
  else if(state==='paused')resumeGame();
}
function pauseGame(){
  if(state!=='playing')return;
  state='paused';stopBgMusic();
  const cfg=LEVELS[level];
  SCR.style.display='flex';
  SCR.innerHTML=`
    <h1>⏸ Paused</h1>
    <p>${cfg.icon} ${cfg.name} &middot; Score: ${score} ⭐</p>
    <button class="sbtn" id="resumeBtn2">▶ Resume</button>

    <button class="sbtn gray" id="quitBtn2">↩ Main Menu</button>
    ${window.parent!==window?'<button class="sbtn teal" id="exitBtn2">🏠 Exit to Pillo</button>':''}
    <p style="font-size:11px;color:#bcd;">Press P or Esc to resume</p>`;
  document.getElementById('resumeBtn2').onclick=resumeGame;
  document.getElementById('restartBtn2').onclick=()=>{showBriefing(level);};
  document.getElementById('quitBtn2').onclick=()=>{score=0;showMenu();};
  const exitBtn=document.getElementById('exitBtn2');
  if(exitBtn)exitBtn.onclick=()=>{window.parent.postMessage({type:'balloonExit'},'*');};
}
function resumeGame(){
  if(state!=='paused')return;
  state='playing';SCR.style.display='none';startBgMusic(level);
}
window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='balloonPauseRequest'){
    stopBgMusic(); // always kill any looping music, regardless of state
    if(state==='playing')pauseGame();
  }
});

const HSIZE={pencil:22,tack:9,ruler:20,scissors:27,pin:9,cactus:29,beaker:19,wire:17,spike:13,rock:17,birdpoop:8,fork:15,pepper:13,dart:20,bird:22,spark:13,note:15,yarn:18};
const HSEV={tack:'small',pin:'small',cactus:'small',birdpoop:'small',rock:'small',pepper:'small',spike:'small',yarn:'small'};
function hSev(h){return HSEV[h.type]||'pop';}

// ── UPDATE ──
function update(){
  if(state!=='playing')return;
  if(invincible>0)invincible--;
  elapsed=performance.now()-startTime;

  // Countdown
  if(timerActive){
    timeLeft=timeLimitSec-elapsed/1000;
    if(timeLeft<=0){timeLeft=0;timeOut();return;}
    const pct=timeLeft/timeLimitSec;
    document.getElementById('cdFill').style.width=(pct*100)+'%';
    document.getElementById('cdFill').style.background=pct>0.4?'#6bcb77':pct>0.2?'#ffd93d':'#ff6b6b';
    document.getElementById('cdText').textContent='⏱'+Math.ceil(timeLeft)+'s';
    if(timeLeft<=10&&!warnedTimer){warnedTimer=true;sfxTimerWarn();}
  }

  // Physics — fast & responsive in all directions
  const BASE=0.75;
  const MAX_V=7.5;
  const DRIFT=-0.042; // passive float up

  if(keys['ArrowLeft']||keys['a']) player.vx-=BASE;
  if(keys['ArrowRight']||keys['d']) player.vx+=BASE;
  if(keys['ArrowUp']||keys['w']) player.vy-=BASE;      // same speed as horizontal
  if(keys['ArrowDown']||keys['s']) player.vy+=BASE*0.9;

  // Passive float when no vertical key
  if(!keys['ArrowUp']&&!keys['w']&&!keys['ArrowDown']&&!keys['s'])
    player.vy+=DRIFT;

  const lp=leakRate*0.15;
  player.vx*=(0.85-lp);
  player.vy*=(0.87-lp*0.5);
  const cap=MAX_V-leakRate*0.5;
  player.vx=Math.max(-cap,Math.min(cap,player.vx));
  player.vy=Math.max(-cap,Math.min(cap,player.vy));
  player.x+=player.vx;player.y+=player.vy;
  player.wobble+=0.16;
  player.x=Math.max(player.r,Math.min(worldW-player.r,player.x));
  player.y=Math.max(player.r+50,Math.min(H-55-player.r,player.y));

  const tgt=player.x-W/2;
  cameraX=Math.max(0,Math.min(worldW-W,lerp(cameraX,tgt,0.1)));

  // Winds
  for(const w of winds){
    w.t+=0.05;
    if(player.x>w.x&&player.x<w.x+w.w&&player.y>w.y&&player.y<w.y+w.h)
      player.vx+=w.dir*w.str;
  }

  // Fans — push only, blade tips pop
  for(const f of fans){
    f.angle+=f.speed*0.055;
    for(let i=0;i<4;i++){
      const ba=f.angle+i*Math.PI/2;
      const tx=f.x+Math.cos(ba)*f.r,ty=f.y+Math.sin(ba)*f.r;
      if(Math.hypot(player.x-tx,player.y-ty)<player.r+7){sfxPop();popBalloon();return;}
    }
    const fd=dist(player,f);
    if(fd<f.r+player.r+16&&fd>0){
      sfxFanPush();
      player.vx+=(player.x-f.x)/fd*2.5;
      player.vy+=(player.y-f.y)/fd*2.5;
    }
  }

  // Hazards
  for(const h of hazards){
    if(h.type==='note'){
      h.x+=(h.bvx||0);h.y+=h.vy;h.vy+=0.04;
      if(h.y<60){h.vy=Math.abs(h.vy)*0.9;}
      if(h.y>H-90){h.vy=-Math.abs(h.vy)*0.9;}
      if(h.x<50||h.x>worldW-50){h.bvx=-(h.bvx||1);}
    } else if(h.type==='yarn'){
      // Yarn balls roll along the floor, bouncing off world edges
      h.x+=(h.bvx||1.2);
      // Stay on the floor zone
      h.y=H-100;
      if(h.x<100){h.bvx=Math.abs(h.bvx||1.2);}
      if(h.x>worldW-100){h.bvx=-Math.abs(h.bvx||1.2);}
      h.mt+=0.1; // spin angle
    } else if(h.moving){
      h.mt+=h.mspeed*0.05;
      if(h.type==='bird'){h.x+=h.bspeed;if(h.x>worldW+120)h.x=-80;h.y+=Math.sin(h.mt*2)*1.8;}
      else h.x=h.mx+Math.sin(h.mt)*h.mrange;
    }
    if(h.type==='spark') h.mt+=0.12;
    if(dist(player,h)<player.r+(HSIZE[h.type]||16)*0.55) puncture(hSev(h));
  }

  // Buses
  for(const b of buses){
    b.x+=b.speed*b.dir;
    if(b.x>worldW+180)b.x=-b.w-10;
    if(b.x<-b.w-180)b.x=worldW+10;
    if(player.x>b.x-8&&player.x<b.x+b.w+8&&player.y>b.y-8&&player.y<b.y+b.h+8){sfxBus();popBalloon();return;}
    if(Math.random()<0.2) particles.push({x:b.x+(b.dir>0?0:b.w),y:b.y+b.h-12,vx:rnd(-0.8,0.8),vy:rnd(-1.2,0),life:0.55,col:'rgba(160,160,160,0.45)',r:rnd(4,10)});
  }

  // Air leak
  if(leakRate>0){
    air-=leakRate;if(air<0){air=0;popBalloon();return;}
    if(Math.random()<0.28) splash(player.x+rnd(-7,7),player.y+rnd(-7,7),1,'rgba(200,230,255,0.5)');
    document.getElementById('airFill').style.width=air+'%';
  }

  // Collectibles
  for(const c of collectibles){
    if(c.collected)continue;c.bob+=0.04;
    if(dist(player,{x:c.x,y:c.y+Math.sin(c.bob)*7})<player.r+18){
      c.collected=true;collected++;score++;sfxCollect();
      splash(c.x,c.y,10,'#ffd93d');updateHUD();
    }
  }

  // Door
  const ddx=player.x-(door.x+door.w/2),ddy=player.y-(door.y+door.h/2);
  if(Math.abs(ddx)<door.w/2+player.r&&Math.abs(ddy)<door.h/2+player.r&&collected>=totalC&&!levelComplete){
    levelComplete=true;state='complete';score+=25;sfxLevelUp();updateHUD();
    saveGame(level+1,score,'Completed '+LEVELS[level].icon+' '+LEVELS[level].name);
    setTimeout(()=>{if(level+1>=LEVELS.length)winGame();else nextLevel();},450);
  }

  // Particles
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.13;p.life-=0.027;}
  particles=particles.filter(p=>p.life>0);
}

// ── DRAW ──
function drawBg(){
  const cfg=LEVELS[level];
  const cfg_bg=LEVELS[level];
  const outdoor=cfg_bg?cfg_bg.outdoor:false;
  const road=cfg_bg?cfg_bg.road:false;
  if(outdoor){
    const grad=ctx.createLinearGradient(0,0,0,H*0.6);
    grad.addColorStop(0,'#87CEEB');grad.addColorStop(1,'#b0e0ff');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H*0.62);
    ctx.fillStyle='#6B8E23';ctx.fillRect(0,H*0.62,W,H*0.08);
    if(road){
      ctx.fillStyle='#555';ctx.fillRect(0,H*0.7,W,H*0.3);
      ctx.strokeStyle='#fff';ctx.lineWidth=5;ctx.setLineDash([40,28]);
      ctx.beginPath();ctx.moveTo(0,H*0.82);ctx.lineTo(W,H*0.82);ctx.stroke();
      ctx.setLineDash([]);
    } else {
      ctx.fillStyle='#90EE90';ctx.fillRect(0,H*0.7,W,H*0.3);
    }
    // Clouds
    ctx.fillStyle='rgba(255,255,255,0.78)';
    for(const [cx,cy,cr] of [[80,45,36],[210,30,48],[380,52,30],[540,38,42],[650,48,28]]){
      const scx=cx-cameraX*0.17;if(scx>-80&&scx<W+80){ctx.beginPath();ctx.arc(scx,cy,cr,0,Math.PI*2);ctx.fill();}
    }
  } else {
    ctx.fillStyle=cfg.bg;ctx.fillRect(0,0,W,H);
    ctx.fillStyle=cfg.wallCol;ctx.fillRect(0,0,W,52);
    ctx.fillStyle=cfg.floorCol;ctx.fillRect(0,H-78,W,78);
    ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,H-78,W,6);
    ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1;
    for(let x=(-cameraX%70+70)%70;x<W;x+=70){ctx.beginPath();ctx.moveTo(x,H-78);ctx.lineTo(x,H);ctx.stroke();}
    // Wall labels
    const WL=[
      [],[],['2+2=4','∫dx','πr²','√16','x²','Σn'],
      ['🎨','🖌️','✏️','🖼️'],['H₂O','CO₂','DNA','ATP','NaCl'],
      [],[],['1776','1492','WWII','Ancient Rome'],
      ['GYM RULES','DODGE!','RUN!','NO POP'],[],['♩♪','DO RE MI','ALLEGRO','♬'],
      ['HELLO WORLD','<html>','print()','SELECT *'],["PRINCIPAL'S OFFICE",'ENTER','KNOCK'],
      ['HALL','PASS?','RUN!','QUIET'],['AFTER SCHOOL'],[]
    ];
    const wl=(WL[level]||[]);
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.font='bold 12px monospace';ctx.textAlign='left';
    wl.forEach((t,i)=>{const sx=80+i*250-cameraX;if(sx>0&&sx<W)ctx.fillText(t,sx,36);});
  }

  // Background furniture
  for(const o of bgObjs){
    const sx=o.x-cameraX;if(sx<-120||sx>W+120)continue;
    ctx.save();
    switch(o.type){
      case'desk':ctx.fillStyle='#795548';ctx.fillRect(sx-32,334,64,10);ctx.fillStyle='#5D4037';ctx.fillRect(sx-26,344,8,34);ctx.fillRect(sx+18,344,8,34);break;
      case'easel':ctx.strokeStyle='#795548';ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(sx,278);ctx.lineTo(sx-22,358);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,278);ctx.lineTo(sx+22,358);ctx.stroke();ctx.fillStyle='#fffde7';ctx.fillRect(sx-26,240,52,46);break;
      case'table':ctx.fillStyle='#455A64';ctx.fillRect(sx-36,334,72,10);ctx.fillStyle='#37474F';ctx.fillRect(sx-30,344,12,34);ctx.fillRect(sx+18,344,12,34);break;
      case'grass':ctx.fillStyle='#388E3C';for(let g=0;g<5;g++){ctx.beginPath();ctx.moveTo(sx-18+g*9,H-80);ctx.lineTo(sx-23+g*9,H-112);ctx.lineTo(sx-13+g*9,H-80);ctx.fill();}break;
      case'cafTable':ctx.fillStyle='#BF360C';ctx.fillRect(sx-42,328,84,12);ctx.fillStyle='#D84315';ctx.fillRect(sx-36,340,10,38);ctx.fillRect(sx+26,340,10,38);break;
      case'pommel':ctx.fillStyle='#6A1B9A';ctx.fillRect(sx-12,298,24,62);ctx.fillStyle='#9C27B0';ctx.beginPath();ctx.arc(sx,298,18,Math.PI,0);ctx.fill();break;
      case'bookshelf':case'shelf':
        // Library bookshelf — tall, brown, colorful spines
        ctx.fillStyle='#5D4037';ctx.fillRect(sx-32,250,64,128);
        ctx.fillStyle='#3E2723';ctx.fillRect(sx-32,250,64,6);ctx.fillRect(sx-32,372,64,6);
        ['#e53935','#1E88E5','#43A047','#FB8C00','#8E24AA','#00838F'].forEach((c,i)=>{ctx.fillStyle=c;ctx.fillRect(sx-28,258+i*18,56,15);});
        // reading lamp on top
        ctx.fillStyle='#FFF176';ctx.beginPath();ctx.arc(sx+20,248,8,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#aaa';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(sx+20,248);ctx.lineTo(sx+20,258);ctx.stroke();
        break;
      case'art_easel':

  dart(h,sx){
    ctx.rotate(Math.PI/6+Math.sin(h.mt)*0.35);
    ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.moveTo(0,-24);ctx.lineTo(4,10);ctx.lineTo(-4,10);ctx.closePath();ctx.fill();
    ctx.fillStyle='#888';ctx.fillRect(-3,10,6,14);
  },
  bird(h,sx){
    ctx.fillStyle='#37474F';ctx.beginPath();ctx.ellipse(0,0,16,10,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#263238';ctx.beginPath();ctx.arc(13,0,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FF9800';ctx.beginPath();ctx.moveTo(19,-2);ctx.lineTo(26,0);ctx.lineTo(19,2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(14,-2,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(14.5,-2,1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#546E7A';
    ctx.save();ctx.rotate(-0.3+Math.sin(h.mt*4)*0.4);ctx.beginPath();ctx.ellipse(-4,-10,12,5,0,0,Math.PI*2);ctx.fill();ctx.restore();
  },
  spark(h,sx){
    ctx.strokeStyle=`hsl(${(Date.now()/10)%60+40},100%,62%)`;ctx.lineWidth=2;
    for(let i=0;i<6;i++){const a=h.mt+i*Math.PI/3;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*18,Math.sin(a)*18);ctx.stroke();}
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();
  },
  note(h,sx){
    ctx.fillStyle='#283593';ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#283593';ctx.fillRect(9,-24,4,24);ctx.fillRect(9,-24,16,6);
  },
  yarn(h,sx){
    const col=h.yarnCol||'#e91e63';
    const r=18;
    // Outer ball
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
    // Wound yarn lines — spin with h.mt
    ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.5;
    for(let i=0;i<4;i++){
      const a=h.mt+i*Math.PI/4;
      ctx.beginPath();ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);ctx.quadraticCurveTo(Math.cos(a+0.8)*r*0.4,Math.sin(a+0.8)*r*0.4,Math.cos(a+Math.PI)*r,Math.sin(a+Math.PI)*r);ctx.stroke();
    }
    // Highlight
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.ellipse(-r*0.3,-r*0.3,r*0.25,r*0.18,-Math.PI/4,0,Math.PI*2);ctx.fill();
    // Little tail of yarn trailing behind
    ctx.strokeStyle=col;ctx.lineWidth=3;ctx.lineCap='round';
    const dir=h.bvx>0?-1:1;
    ctx.beginPath();ctx.moveTo(r*dir,0);ctx.quadraticCurveTo(r*dir+dir*14,-8,r*dir+dir*22,4);ctx.stroke();
  },
};

function drawHaz(h){
  const sx=h.x-cameraX;if(sx<-90||sx>W+90)return;
  ctx.save();ctx.translate(sx,h.y);
  if(DRAW_HAZ[h.type]) DRAW_HAZ[h.type](h,sx);
  ctx.restore();
}

function drawFan(f){
  const sx=f.x-cameraX;if(sx<-90||sx>W+90)return;
  ctx.save();ctx.translate(sx,f.y);
  ctx.fillStyle='#607D8B';ctx.fillRect(-6,-4,12,24);
  ctx.rotate(f.angle);
  for(let i=0;i<4;i++){
    ctx.save();ctx.rotate(i*Math.PI/2);
    ctx.fillStyle='rgba(100,181,246,0.72)';
    ctx.beginPath();ctx.ellipse(f.r/2,0,f.r/2,12,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(244,67,54,0.95)';ctx.beginPath();ctx.arc(f.r,0,7,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle='#90A4AE';ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(244,67,54,0.3)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(0,0,f.r+9,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

function drawWind(w){
  const sx=w.x-cameraX;if(sx>W+100||sx+w.w<-100)return;
  ctx.save();ctx.globalAlpha=0.1+Math.sin(w.t)*0.04;
  ctx.fillStyle=w.dir>0?'#29b6f6':'#ce93d8';ctx.fillRect(sx,w.y,w.w,w.h);
  ctx.globalAlpha=0.35;ctx.strokeStyle=w.dir>0?'#29b6f6':'#ce93d8';ctx.lineWidth=1.5;
  for(let i=0;i<5;i++){const ly=w.y+40+i*50;ctx.beginPath();ctx.moveTo(sx+(w.dir>0?0:w.w),ly);ctx.bezierCurveTo(sx+w.w*0.35,ly-16,sx+w.w*0.65,ly+16,sx+(w.dir>0?w.w:0),ly);ctx.stroke();}
  ctx.restore();
}

function drawCollectible(c){
  if(c.collected)return;
  const sx=c.x-cameraX;if(sx<-60||sx>W+60)return;
  const by=c.y+Math.sin(c.bob)*7;
  ctx.save();ctx.translate(sx,by);
  ctx.shadowColor='#ffd93d';ctx.shadowBlur=20;
  ctx.fillStyle='#fffde7';ctx.fillRect(-13,-15,26,30);
  ctx.shadowBlur=0;ctx.strokeStyle='#ffd93d';ctx.lineWidth=2.5;ctx.strokeRect(-13,-15,26,30);
  ctx.strokeStyle='#ccc';ctx.lineWidth=1;
  for(let l=0;l<3;l++){ctx.beginPath();ctx.moveTo(-8,-5+l*8);ctx.lineTo(8,-5+l*8);ctx.stroke();}
  ctx.restore();
}

function drawDoor(){
  const sx=door.x-cameraX;if(sx>W+70||sx+door.w<-70)return;
  const ready=collected>=totalC;
  ctx.save();
  if(ready){ctx.shadowColor='#ffd93d';ctx.shadowBlur=22;}
  ctx.fillStyle=ready?'#1b5e20':'#4e342e';ctx.fillRect(sx,door.y,door.w,door.h);
  ctx.fillStyle=ready?'#2e7d32':'#5d4037';ctx.fillRect(sx+3,door.y+3,door.w-6,door.h-6);
  ctx.shadowBlur=0;
  ctx.fillStyle=ready?'#f9a825':'#9e9e9e';ctx.beginPath();ctx.arc(sx+door.w-10,door.y+door.h*0.5,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=ready?'#f9a825':'rgba(255,255,255,0.4)';
  ctx.font='bold 11px sans-serif';ctx.textAlign='center';
  ctx.fillText(ready?'EXIT!':'📄×'+totalC,sx+door.w/2,door.y-10);
  ctx.textAlign='left';ctx.restore();
}

function drawBuses(){
  for(const b of buses){
    const sx=b.x-cameraX;if(sx>W+170||sx+b.w<-170)continue;
    ctx.save();ctx.translate(sx,b.y);
    if(b.dir<0){ctx.scale(-1,1);ctx.translate(-b.w,0);}
    ctx.fillStyle='#F9A825';ctx.fillRect(0,0,b.w,b.h);
    ctx.fillStyle='#F57F17';ctx.fillRect(0,0,b.w,10);
    ctx.fillStyle='rgba(200,230,255,0.85)';
    for(let i=0;i<4;i++)ctx.fillRect(10+i*30,12,24,20);
    ctx.fillStyle='#e53935';ctx.beginPath();ctx.arc(b.w+8,b.h/2,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 7px sans-serif';ctx.textAlign='center';ctx.fillText('STOP',b.w+8,b.h/2+3);
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(18,b.h+2,13,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(b.w-18,b.h+2,13,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#555';ctx.beginPath();ctx.arc(18,b.h+2,7,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(b.w-18,b.h+2,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fffde7';ctx.fillRect(b.w,10,9,15);
    ctx.textAlign='left';ctx.restore();
  }
}

function drawPlayer(){
  if(state==='dead')return;
  const blink=invincible>0&&Math.floor(invincible/5)%2===0;if(blink)return;
  const sx=player.x-cameraX;
  ctx.save();ctx.translate(sx,player.y);
  ctx.fillStyle='rgba(0,0,0,0.09)';ctx.beginPath();ctx.ellipse(0,player.r+7,player.r*0.58,5,0,0,Math.PI*2);ctx.fill();
  const ar=air/100,r=player.r*(0.68+ar*0.32);
  const wx=Math.sin(player.wobble)*2.5,wy=Math.cos(player.wobble*0.7)*2;
  ctx.scale(1+player.vx*0.025,1/(1+player.vx*0.025));ctx.rotate(player.vx*0.016);
  const g=ctx.createRadialGradient(-r*0.3,-r*0.35,r*0.07,-r*0.1,-r*0.1,r*1.2);
  g.addColorStop(0,'rgba(255,255,255,0.65)');g.addColorStop(0.35,'#ff6b6b');g.addColorStop(1,'#b71c1c');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(wx,wy,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();ctx.ellipse(-r*0.3,-r*0.32,r*0.26,r*0.16,-Math.PI/4,0,Math.PI*2);ctx.fill();
  const fs=Math.max(0.3,ar);
  ctx.fillStyle='rgba(0,0,0,0.72)';
  ctx.beginPath();ctx.arc(wx-5*fs,wy-3*fs,3*fs,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(wx+5*fs,wy-3*fs,3*fs,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.68)';ctx.lineWidth=1.5*fs;
  ctx.beginPath();if(air<25)ctx.arc(wx,wy+7*fs,5*fs,0,Math.PI,false);else ctx.arc(wx,wy+2*fs,5*fs,0,Math.PI);ctx.stroke();
  ctx.fillStyle='#212121';ctx.fillRect(-r*0.52,-r-9,r*1.04,-5);ctx.fillRect(-r*0.72,-r-14,r*1.44,5);
  ctx.strokeStyle='#ffd93d';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(r*0.72,-r-12);ctx.lineTo(r*0.72+10,-r-2);ctx.stroke();
  ctx.fillStyle='#ffd93d';ctx.beginPath();ctx.arc(r*0.72+10,-r-2,3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(wx,r);ctx.quadraticCurveTo(wx+8,r+20,wx,r+30);ctx.stroke();
  ctx.restore();
}

function drawParticles(){
  for(const p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x-cameraX,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawBg();
  for(const w of winds)drawWind(w);
  for(const f of fans)drawFan(f);
  for(const c of collectibles)drawCollectible(c);
  drawDoor();
  for(const h of hazards)drawHaz(h);
  drawBuses();
  drawPlayer();
  drawParticles();

  if(state==='playing'){
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,H-24,W,24);
    ctx.fillStyle='#fff';ctx.font='11px sans-serif';ctx.textAlign='center';
    const tip=collected>=totalC?'🚪 Door is open — reach the EXIT!':'📄 Collect all sheets, then reach the 🚪 door!';
    ctx.fillText(tip+' · Balloon floats up — press ↓ to descend',W/2,H-9);
    ctx.textAlign='left';
  }

  if(leakRate>0&&state==='playing'){
    ctx.fillStyle=`rgba(255,60,60,${0.07+Math.sin(Date.now()/155)*0.05})`;ctx.fillRect(0,0,W,H);
    if(leakRate>0.1){
      ctx.fillStyle=`rgba(255,80,80,${0.45+Math.sin(Date.now()/170)*0.3})`;
      ctx.font='bold 13px sans-serif';ctx.textAlign='center';
      ctx.fillText('💨 AIR LEAKING!',W/2,82);ctx.textAlign='left';
    }
  }
}

function loop(){update();draw();animId=requestAnimationFrame(loop);}

window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
  if((e.key==='p'||e.key==='P'||e.key==='Escape')&&(state==='playing'||state==='paused')){
    e.preventDefault();
    togglePause();
  }
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

// ── INIT ──
showMenu();
</script>
</body>
</html>
